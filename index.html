<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robert Games Schedule</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 1rem;
}

h2 {
  text-align: center;
  color: #d32f2f;
}

.button-bar {
  text-align: center;
  margin-bottom: 1rem;
}

button {
  padding: 0.6rem 1rem;
  border: none;
  border-radius: 5px;
  font-size: 0.9rem;
  cursor: pointer;
}

.print-btn {
  background: #d32f2f;
  color: white;
}

.refresh-btn {
  background: #1976d2;
  color: white;
  margin-left: 10px;
}

.refresh-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

#legend {
  max-width: 700px;
  margin: 0 auto 1rem auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 5px;
  color: white;
  cursor: pointer;
}

.legend-item img {
  width: 18px;
  height: 18px;
}

.legend-item.disabled {
  opacity: 0.4;
}

#events {
  max-width: 700px;
  margin: 0 auto;
}

.event {
  background: white;
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: 1rem;
  border-left: 6px solid;
}

.event.tbd {
  opacity: 0.85;
  border-left-style: dashed;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.title-row img {
  width: 22px;
  height: 22px;
}

.title {
  font-weight: bold;
}

.meta {
  font-size: 0.9rem;
  margin-top: 0.3rem;
}

.badge {
  display: inline-block;
  margin-top: 6px;
  padding: 3px 8px;
  font-size: 0.75rem;
  border-radius: 4px;
  background: #eee;
  color: #555;
}
</style>
</head>

<body>

<h2>Robert Games Schedule</h2>

<div class="button-bar">
  <button class="print-btn" onclick="window.print()">Print</button>
  <button id="refreshBtn" class="refresh-btn" onclick="refreshEvents()">Refresh</button>
</div>

<div id="legend"></div>
<div id="events">Loading...</div>

<script>
const API_URL = "https://r-games.veinoffeeling.workers.dev";

const SOURCE_NAMES = {
  team1: "Huron Valley JV",
  team2: "Walled Lake JV",
  default: "Other"
};

// COLORS
const COLORS = {
  team1: "#000000",
  team2: "#969696",
  default: "#616161"
};

const LOGOS = {
  team1: "https://raw.githubusercontent.com/coachskrause/r-games/refs/heads/main/HV-50.png",
  team2: "https://raw.githubusercontent.com/coachskrause/r-games/refs/heads/main/WLN-50.png"
};

let allEvents = [];
let activeSources = new Set();

const SOURCE_ORDER = ["team1", "team2"];

// Detect all-day
function isAllDay(dateStr) {
  const d = new Date(dateStr);
  return d.getHours() === 0 && d.getMinutes() === 0;
}

// Format date
function formatDate(dateStr) {
  const d = new Date(dateStr);

  const datePart = d.toLocaleDateString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric"
  });

  if (isAllDay(dateStr)) {
    return `${datePart} (TBD)`;
  }

  const timePart = d.toLocaleTimeString(undefined, {
    hour: "numeric",
    minute: "2-digit"
  });

  return `${datePart}, ${timePart}`;
}

function mapsLink(location) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
}

async function load(useRefresh = false) {
  const url = useRefresh ? API_URL + "?refresh=1" : API_URL;

  const res = await fetch(url);
  const data = await res.json();

  // Sort (TBD last)
  data.sort((a, b) => {
    const aDate = new Date(a.start);
    const bDate = new Date(b.start);

    if (aDate.toDateString() === bDate.toDateString()) {
      return isAllDay(a.start) - isAllDay(b.start);
    }

    return aDate - bDate;
  });

  allEvents = data;

  const sources = [...new Set(allEvents.map(e => e.source || "default"))];
  const orderedSources = SOURCE_ORDER.filter(s => sources.includes(s));

  // Only initialize once
  if (activeSources.size === 0) {
    orderedSources.forEach(s => activeSources.add(s));
  }

  renderLegend(orderedSources);
  renderEvents();
}

// Refresh button logic
async function refreshEvents() {
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  btn.innerText = "Refreshing...";

  await load(true);

  btn.disabled = false;
  btn.innerText = "Refresh";
}

function renderLegend(sources) {
  const legend = document.getElementById("legend");

  legend.innerHTML = sources.map(source => {
    const color = COLORS[source] || COLORS.default;
    const name = SOURCE_NAMES[source] || source;
    const logo = LOGOS[source];

    return `
      <div class="legend-item"
           style="background:${color}"
           onclick="toggleSource('${source}', this)">
        ${logo ? `<img src="${logo}">` : ""}
        ${name}
      </div>
    `;
  }).join("");
}

function toggleSource(source, el) {
  if (activeSources.has(source)) {
    activeSources.delete(source);
    el.classList.add("disabled");
  } else {
    activeSources.add(source);
    el.classList.remove("disabled");
  }

  renderEvents();
}

function renderEvents() {
  const container = document.getElementById("events");

  const filtered = allEvents.filter(e =>
    activeSources.has(e.source || "default")
  );

  if (!filtered.length) {
    container.innerHTML = "No events to display";
    return;
  }

  container.innerHTML = filtered.map(e => {
    const color = COLORS[e.source] || COLORS.default;
    const tbd = isAllDay(e.start);

    return `
      <div class="event ${tbd ? "tbd" : ""}" style="border-left-color:${color}">
        
        <div class="title-row">
          ${LOGOS[e.source] ? `<img src="${LOGOS[e.source]}">` : ""}
          <div class="title">${e.title}</div>
        </div>

        <div class="meta">${formatDate(e.start)}</div>

        ${tbd ? `<div class="badge">Game Time Not Set</div>` : ""}

        ${
          e.location
          ? `<div class="meta">
               <a href="${mapsLink(e.location)}" target="_blank">
                 ${e.location}
               </a>
             </div>`
          : ""
        }

      </div>
    `;
  }).join("");
}

// Initial load
load();
</script>

</body>
</html>
