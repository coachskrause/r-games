<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robert Games Schedule</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 1rem;
}

h2 {
  text-align: center;
  color: #d32f2f;
}

button {
  display: block;
  margin: 0 auto 1rem auto;
  padding: 0.6rem 1rem;
  border: none;
  background: #d32f2f;
  color: white;
  border-radius: 5px;
}

#legend {
  max-width: 700px;
  margin: 0 auto 1rem auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 5px;
  color: white;
  cursor: pointer;
}

.legend-item img {
  width: 18px;
  height: 18px;
  object-fit: contain;
}

.legend-item.disabled {
  opacity: 0.4;
}

#events {
  max-width: 700px;
  margin: 0 auto;
}

.event {
  background: white;
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: 1rem;
  border-left: 6px solid;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.title-row img {
  width: 22px;
  height: 22px;
  object-fit: contain;
}

.title {
  font-weight: bold;
}

.meta {
  font-size: 0.9rem;
  margin-top: 0.3rem;
}
</style>
</head>

<body>

<h2>Robert Games Schedule</h2>
<button onclick="window.print()">Print</button>

<div id="legend"></div>
<div id="events">Loading...</div>

<script>
const API_URL = "https://r-games.veinoffeeling.workers.dev";

// DISPLAY NAMES
const SOURCE_NAMES = {
  team1: "HVJV",
  team2: "WLJV",
  default: "Other"
};

// COLORS
const COLORS = {
  team1: "#000000",
  team2: "#969696",
  default: "#616161"
};

// LOGOS (REPLACE WITH YOUR REAL URLs)
const LOGOS = {
  team1: "https://raw.githubusercontent.com/coachskrause/r-games/refs/heads/main/HV-50.png",
  team2: "https://raw.githubusercontent.com/coachskrause/r-games/refs/heads/main/WLN-50.png"
};

let allEvents = [];
let activeSources = new Set();

// FORCE BUTTON ORDER
const SOURCE_ORDER = ["team1", "team2"];

function formatDate(dateStr) {
  const d = new Date(dateStr);

  return d.toLocaleString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  });
}

function mapsLink(location) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
}

async function load() {
  const res = await fetch(API_URL);
  const data = await res.json();

  allEvents = data;

  const sources = [...new Set(allEvents.map(e => e.source || "default"))];

  const orderedSources = SOURCE_ORDER.filter(s => sources.includes(s));

  orderedSources.forEach(s => activeSources.add(s));

  renderLegend(orderedSources);
  renderEvents();
}

function renderLegend(sources) {
  const legend = document.getElementById("legend");

  legend.innerHTML = sources.map(source => {
    const color = COLORS[source] || COLORS.default;
    const name = SOURCE_NAMES[source] || source;
    const logo = LOGOS[source];

    return `
      <div class="legend-item"
           style="background:${color}"
           onclick="toggleSource('${source}', this)">
        ${logo ? `<img src="${logo}" alt="">` : ""}
        ${name}
      </div>
    `;
  }).join("");
}

function toggleSource(source, el) {
  if (activeSources.has(source)) {
    activeSources.delete(source);
    el.classList.add("disabled");
  } else {
    activeSources.add(source);
    el.classList.remove("disabled");
  }

  renderEvents();
}

function renderEvents() {
  const container = document.getElementById("events");

  const filtered = allEvents.filter(e =>
    activeSources.has(e.source || "default")
  );

  if (!filtered.length) {
    container.innerHTML = "No events to display";
    return;
  }

  const html = filtered.map(e => {
    const color = COLORS[e.source] || COLORS.default;

    return `
      <div class="event" style="border-left-color:${color}">
        
        <div class="title-row">
          ${LOGOS[e.source] ? `<img src="${LOGOS[e.source]}" alt="">` : ""}
          <div class="title">${e.title}</div>
        </div>

        <div class="meta">${formatDate(e.start)}</div>

        ${
          e.location
          ? `<div class="meta">
               <a href="${mapsLink(e.location)}" target="_blank">
                 ${e.location}
               </a>
             </div>`
          : ""
        }

      </div>
    `;
  }).join("");

  container.innerHTML = html;
}

load();
</script>

</body>
</html>
