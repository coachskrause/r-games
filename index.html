<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robert Games Schedule</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 1rem;
}

h2 {
  text-align: center;
  color: #d32f2f;
}

button {
  display: block;
  margin: 0 auto 0.5rem auto;
  padding: 0.6rem 1rem;
  border: none;
  background: #d32f2f;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

#lastUpdated {
  text-align: center;
  font-size: 0.8rem;
  margin-bottom: 10px;
  color: #555;
}

#legend {
  max-width: 700px;
  margin: 0 auto 1rem auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 5px;
  color: white;
  cursor: pointer;
}

.legend-item img {
  width: 18px;
  height: 18px;
}

.legend-item.disabled {
  opacity: 0.4;
}

#events {
  max-width: 700px;
  margin: 0 auto;
}

.event {
  background: white;
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: 1rem;
  border-left: 6px solid;
}

/* DASHED BORDER FOR TBD */
.event.tbd {
  border-left-style: dashed !important;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.title-row img {
  width: 22px;
  height: 22px;
}

.title {
  font-weight: bold;
}

.meta {
  font-size: 0.9rem;
  margin-top: 0.3rem;
}

.badge {
  display: inline-block;
  margin-top: 6px;
  padding: 3px 8px;
  font-size: 0.75rem;
  border-radius: 4px;
  background: #ff9800;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Robert Games Schedule</h2>

<button onclick="refreshData()">Refresh</button>

<div id="lastUpdated"></div>
<div id="legend"></div>
<div id="events"></div>

<script>
const API_URL = "https://r-games.veinoffeeling.workers.dev";

// STORAGE KEYS
const STORAGE_KEY = "games_cache";
const STORAGE_TS = "games_cache_ts";

// DISPLAY NAMES
const SOURCE_NAMES = {
  team1: "Huron Valley JV",
  team2: "Walled Lake JV"
};

// COLORS
const COLORS = {
  team1: "#000000",
  team2: "#969696"
};

// LOGOS
const LOGOS = {
  team1: "https://raw.githubusercontent.com/coachskrause/r-games/refs/heads/main/HV-50.png",
  team2: "https://raw.githubusercontent.com/coachskrause/r-games/refs/heads/main/WLN-50.png"
};

const SOURCE_ORDER = ["team1", "team2"];

let allEvents = [];
let activeSources = new Set();

function formatDate(dateStr) {
  if (!dateStr) return "No date";

  const d = new Date(dateStr);

  // TRUE all-day detection
  const isAllDay = !dateStr.includes("T");

  if (isAllDay) {
    return d.toLocaleDateString() + " (TBD)";
  }

  return d.toLocaleString();
}

function mapsLink(location) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
}

// ---------- INSTANT CACHE ----------
function loadCacheImmediate() {
  try {
    const cached = localStorage.getItem(STORAGE_KEY);
    const ts = localStorage.getItem(STORAGE_TS);

    if (!cached) return false;

    const events = JSON.parse(cached);
    if (!events || !events.length) return false;

    allEvents = events;

    updateLastUpdated(ts, true);

    setupSources();
    renderEvents();

    return true;
  } catch {
    return false;
  }
}

// ---------- FETCH ----------
async function load(force = false) {
  try {
    const url = force ? API_URL + "?refresh=1" : API_URL;

    const res = await fetch(url);
    const data = await res.json();

    const newEvents = data.events || [];
    if (!newEvents.length) return;

    const old = localStorage.getItem(STORAGE_KEY);
    const newStr = JSON.stringify(newEvents);

    if (old === newStr) return;

    localStorage.setItem(STORAGE_KEY, newStr);
    localStorage.setItem(STORAGE_TS, data.lastUpdated);

    allEvents = newEvents;

    updateLastUpdated(data.lastUpdated);
    setupSources();
    renderEvents();

  } catch (err) {
    console.log("Fetch failed, using cache");
  }
}

function updateLastUpdated(ts, cached = false) {
  if (!ts) return;

  const d = new Date(ts);

  document.getElementById("lastUpdated").innerText =
    "Last updated: " + d.toLocaleString() + (cached ? " (cached)" : "");
}

function refreshData() {
  document.getElementById("lastUpdated").innerText = "Refreshing...";
  load(true);
}

function setupSources() {
  const sources = [...new Set(allEvents.map(e => e.source))];
  const ordered = SOURCE_ORDER.filter(s => sources.includes(s));

  activeSources = new Set(ordered);
  renderLegend(ordered);
}

function renderLegend(sources) {
  const legend = document.getElementById("legend");

  legend.innerHTML = sources.map(source => `
    <div class="legend-item"
         style="background:${COLORS[source]}"
         onclick="toggleSource('${source}', this)">
      <img src="${LOGOS[source]}">
      ${SOURCE_NAMES[source]}
    </div>
  `).join("");
}

function toggleSource(source, el) {
  if (activeSources.has(source)) {
    activeSources.delete(source);
    el.classList.add("disabled");
  } else {
    activeSources.add(source);
    el.classList.remove("disabled");
  }

  renderEvents();
}

// ---------- EVENTS ----------
function renderEvents() {
  const container = document.getElementById("events");

  const filtered = allEvents.filter(e =>
    activeSources.has(e.source)
  );

  if (!filtered.length) return;

  container.innerHTML = filtered.map(e => {
    const isTBD = !e.start || !e.start.includes("T");

    return `
      <div class="event ${isTBD ? 'tbd' : ''}" style="border-left-color:${COLORS[e.source]}">

        <div class="title-row">
          <img src="${LOGOS[e.source]}">
          <div class="title">${e.title}</div>
        </div>

        ${isTBD ? `<div class="badge">Game Time Not Set</div>` : ""}

        <div class="meta">${formatDate(e.start)}</div>

        ${
          e.location
          ? `<div class="meta">
               <a href="${mapsLink(e.location)}" target="_blank">
                 ${e.location}
               </a>
             </div>`
          : ""
        }

      </div>
    `;
  }).join("");
}

// ---------- INIT ----------
const hasCache = loadCacheImmediate();

if (!hasCache) {
  document.getElementById("events").innerText = "Loading...";
}

load();
</script>

</body>
</html>
