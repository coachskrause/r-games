<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robert Games Schedule</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 1rem;
}

h2 {
  text-align: center;
  color: #d32f2f;
}

button {
  display: block;
  margin: 0 auto 0.5rem auto;
  padding: 0.6rem 1rem;
  border: none;
  background: #d32f2f;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

#lastUpdated {
  text-align: center;
  font-size: 0.8rem;
  margin-bottom: 10px;
  color: #555;
}

#legend {
  max-width: 700px;
  margin: 0 auto 1rem auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 5px;
  color: white;
  cursor: pointer;
}

.legend-item img {
  width: 18px;
  height: 18px;
}

.legend-item.disabled {
  opacity: 0.4;
}

#events {
  max-width: 700px;
  margin: 0 auto;
}

.event {
  background: white;
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: 1rem;
  border-left: 6px solid;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.title-row img {
  width: 22px;
  height: 22px;
}

.title {
  font-weight: bold;
}

.meta {
  font-size: 0.9rem;
  margin-top: 0.3rem;
}
</style>
</head>

<body>

<h2>Robert Games Schedule</h2>

<button onclick="refreshData()">Refresh</button>

<div id="lastUpdated">Loading...</div>

<div id="legend"></div>
<div id="events">Loading...</div>

<script>
const API_URL = "https://r-games.veinoffeeling.workers.dev";

// STORAGE KEYS
const STORAGE_KEY = "games_cache";
const STORAGE_TS = "games_cache_ts";

// DISPLAY NAMES
const SOURCE_NAMES = {
  team1: "Huron Valley JV",
  team2: "Walled Lake JV",
  default: "Other"
};

// COLORS
const COLORS = {
  team1: "#000000",
  team2: "#969696",
  default: "#616161"
};

// LOGOS
const LOGOS = {
  team1: "https://raw.githubusercontent.com/coachskrause/r-games/refs/heads/main/HV-50.png",
  team2: "https://raw.githubusercontent.com/coachskrause/r-games/refs/heads/main/WLN-50.png"
};

const SOURCE_ORDER = ["team1", "team2"];

let allEvents = [];
let activeSources = new Set();

function formatDate(dateStr) {
  if (!dateStr) return "No date";

  const d = new Date(dateStr);

  if (dateStr.endsWith("T00:00:00")) {
    return d.toLocaleDateString() + " (TBD)";
  }

  return d.toLocaleString();
}

function mapsLink(location) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
}

function saveCache(events, ts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  localStorage.setItem(STORAGE_TS, ts);
}

function loadCache() {
  try {
    const events = JSON.parse(localStorage.getItem(STORAGE_KEY));
    const ts = localStorage.getItem(STORAGE_TS);

    if (events && events.length) {
      allEvents = events;
      updateLastUpdated(ts + " (cached)");
      setupSources();
      renderEvents();
    }
  } catch {}
}

async function load(force = false) {
  try {
    const url = force ? API_URL + "?refresh=1" : API_URL;

    const res = await fetch(url);
    const data = await res.json();

    const events = data.events || [];

    // 🚨 ONLY overwrite if we got GOOD data
    if (events.length > 0) {
      allEvents = events;

      saveCache(events, data.lastUpdated);
      updateLastUpdated(data.lastUpdated);

      setupSources();
      renderEvents();
    }

  } catch (err) {
    console.error("Fetch failed, using cache");
  }
}

function setupSources() {
  const sources = [...new Set(allEvents.map(e => e.source || "default"))];
  const ordered = SOURCE_ORDER.filter(s => sources.includes(s));

  activeSources = new Set(ordered);

  renderLegend(ordered);
}

function updateLastUpdated(ts) {
  if (!ts) return;

  document.getElementById("lastUpdated").innerText =
    "Last updated: " + new Date(ts).toLocaleString();
}

function refreshData() {
  document.getElementById("lastUpdated").innerText = "Refreshing...";
  load(true);
}

function renderLegend(sources) {
  const legend = document.getElementById("legend");

  legend.innerHTML = sources.map(source => {
    const color = COLORS[source];
    const name = SOURCE_NAMES[source];
    const logo = LOGOS[source];

    return `
      <div class="legend-item"
           style="background:${color}"
           onclick="toggleSource('${source}', this)">
        <img src="${logo}">
        ${name}
      </div>
    `;
  }).join("");
}

function toggleSource(source, el) {
  if (activeSources.has(source)) {
    activeSources.delete(source);
    el.classList.add("disabled");
  } else {
    activeSources.add(source);
    el.classList.remove("disabled");
  }

  renderEvents();
}

function renderEvents() {
  const container = document.getElementById("events");

  const filtered = allEvents.filter(e =>
    activeSources.has(e.source || "default")
  );

  if (!filtered.length) {
    // 🚨 DO NOTHING — KEEP OLD CONTENT
    return;
  }

  const html = filtered.map(e => {
    const color = COLORS[e.source];

    return `
      <div class="event" style="border-left-color:${color}">
        <div class="title-row">
          <img src="${LOGOS[e.source]}">
          <div class="title">${e.title}</div>
        </div>

        <div class="meta">${formatDate(e.start)}</div>

        ${
          e.location
          ? `<div class="meta">
               <a href="${mapsLink(e.location)}" target="_blank">
                 ${e.location}
               </a>
             </div>`
          : ""
        }
      </div>
    `;
  }).join("");

  container.innerHTML = html;
}

// 🚀 LOAD FLOW
loadCache();   // instant load
load();        // background refresh
</script>

</body>
</html>
